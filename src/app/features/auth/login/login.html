<div class="min-h-screen bg-[#f8f9fa] flex items-center justify-center p-4">
  <div class="bg-white p-10 sm:p-12 rounded-[24px] shadow-sm w-full max-w-[440px]">
    <!-- Logo -->
    <div class="mb-8 font-bold text-[17px] tracking-tight text-black">
      KICK<span class="text-gray-400 font-normal">store</span>
    </div>

    <!-- Headers -->
    <div class="mb-10">
      <h2 class="text-[22px] font-extrabold text-gray-900 mb-2 tracking-tight">Bienvenido de nuevo</h2>
      <p class="text-[14px] text-gray-400 font-medium">Inicia sesión para continuar</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      
      @if (errorMessage) {
        <div class="p-4 text-[13px] font-bold text-red-600 bg-red-50 rounded-[14px] border border-red-100">
          {{ errorMessage }}
        </div>
      }

      <!-- Email Field -->
      <div>
        <label for="email" class="block text-[12px] font-bold text-gray-600 mb-2 ml-1">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="email"
          class="w-full px-5 py-4 bg-[#eef2f9] border border-transparent rounded-[14px] text-[14px] text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all font-semibold"
        />
      </div>

      <!-- Password Field -->
      <div>
        <label for="password" class="block text-[12px] font-bold text-gray-600 mb-2 ml-1">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="password"
          class="w-full px-5 py-4 bg-[#eef2f9] border border-transparent rounded-[14px] text-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all tracking-[0.2em]"
        />
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="w-full mt-4 bg-[#0f0f0f] text-white py-4 rounded-[14px] font-bold text-[15px] hover:bg-black hover:shadow-lg transition-all"
      >
        Iniciar sesión
      </button>

    </form>

    <!-- Footer link -->
    <div class="mt-8 text-center">
      <p class="text-[13px] text-gray-400 font-medium">
        ¿No tienes cuenta? 
        <a routerLink="/register" class="text-black font-extrabold hover:underline transition-all">Regístrate</a>
      </p>
    </div>
  </div>
</div>
